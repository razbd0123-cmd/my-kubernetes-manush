apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-webapp-ingress
  namespace: my-webapp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: my-webapp.local   # <-- שנה לדומיין שלך
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: my-webapp-svc
                port:
                  number: 80
