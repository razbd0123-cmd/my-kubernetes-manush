<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My App - Kubernetes + ArgoCD</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 48px 56px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .logo-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 28px;
      font-size: 48px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      color: rgba(255,255,255,0.6);
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }

    .info-box {
      background: rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 14px;
    }

    .info-box .label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .info-box .value {
      font-size: 0.9rem;
      font-weight: 600;
      word-break: break-all;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #6d28d9, #2563eb);
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .refresh-btn {
      margin-top: 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 10px 28px;
      border-radius: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .refresh-btn:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <span title="Kubernetes">☸️</span>
      <span title="ArgoCD">🐙</span>
    </div>
    <h1>My Web App</h1>
    <p class="subtitle">Deployed with ArgoCD · Running on Kubernetes</p>

    <div class="info-grid">
      <div class="info-box">
        <div class="label">Pod Name</div>
        <div class="value" id="pod">Loading...</div>
      </div>
      <div class="info-box">
        <div class="label">Version</div>
        <div class="value" id="version">—</div>
      </div>
      <div class="info-box" style="grid-column: span 2;">
        <div class="label">Timestamp</div>
        <div class="value" id="timestamp">—</div>
      </div>
    </div>

    <div class="badge">3 Replicas · GitOps</div>
    <br />
    <button class="refresh-btn" onclick="fetchInfo()">Refresh</button>
  </div>

  <script>
    async function fetchInfo() {
      try {
        const res = await fetch('/api/info');
        const data = await res.json();
        document.getElementById('pod').textContent = data.pod;
        document.getElementById('version').textContent = data.version;
        document.getElementById('timestamp').textContent = new Date(data.timestamp).toLocaleString('he-IL');
      } catch (e) {
        document.getElementById('pod').textContent = 'Error';
      }
    }
    fetchInfo();
  </script>
</body>
</html>
